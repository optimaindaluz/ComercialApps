# Fly.io configuration for comerciales-energia server

app = "comerciales-energia-server"
primary_region = "mad"  # Madrid, Spain

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # Las variables sensibles (SUPABASE_DB_URL, JWT_SECRET, etc.) se añaden con: flyctl secrets set NOMBRE=valor

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpus = 1
