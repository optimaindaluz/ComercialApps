services:
  - type: web
    name: comerciales-energia-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt  # Europa, el más cercano a España en Render gratuito
    envVars:
      - key: NODE_ENV
        value: production
      # Las siguientes variables hay que añadirlas manualmente en el dashboard de Render:
      # SUPABASE_DB_URL
      # SUPABASE_URL
      # SUPABASE_SERVICE_ROLE_KEY
      # JWT_SECRET
